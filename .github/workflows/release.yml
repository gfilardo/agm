name: Build and Release Single HTML

on:
  push:
    tags:
      - 'v*' # Triggers workflow only when a tag starting with "v" (e.g., v0.0.1) is pushed

permissions:
  contents: write # Required to create a release

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Build Single HTML File
        run: npm run build

      - name: Rename Output File
        run: mv dist/index.html dist/agm-offline-terminal.html

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/agm-offline-terminal.html
          generate_release_notes: true
